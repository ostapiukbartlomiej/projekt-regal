<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="scripts/buttons/add-book-button.js"></script>
    <script src="scripts/buttons/add-book-to-list.js"></script>
    <script src="scripts/buttons/close-form-button.js"></script>
    <script src="scripts/graphicsScripts/add-book-to-canvas.js"></script>
    <script src="scripts/config.js"></script>
    <script src="scripts/initializator.js"></script>
    <script>
        window.onload = function () {
            init();
        }
    </script>
    <link rel="stylesheet" href="styles/book-container.css">
    <link rel="stylesheet" href="styles/modal-add-book.css">
    <link rel="stylesheet" href="styles/toast-validation-error.css">
    <link rel="stylesheet" href="styles/toast-success.css">
</head>
<body>
    <button id="addBook" onclick="addBookUIButton()">Add Book</button>
    <div class="book-container">
        <div class="book" data-id="1" style="background-color: #ff0000; width: 40px; height: 100px; cursor: pointer; left: 300px; top: 500px;" data-grubosc="2.0" data-color="#ff0000"></div>
        <div class="book" data-id="1" style="background-color: #3300aa; width: 20px; height: 100px; cursor: pointer; left: 700px; top: 300px" data-grubosc="2.0" data-color="#ff0000"></div>
        <div class="book" data-id="1" style="background-color: #1122dd; width: 50px; height: 100px; cursor: pointer; left: 500px; top: 250px;" data-grubosc="2.0" data-color="#ff0000"></div>
    </div>
    


    <div id="modal-add-book-curtain" class="curtain"></div>
    <div id="modal-add-book" class="modal-add-book">
        <button id="exit" onclick="closeForm()">X</button>
        <div id="nazwa" class="form-field">
            <h2 class="form-label">Tytuł książki<span class="required">*</span>:</h2>
            <input id="nazwa_input" type="text">
        </div>
        <div id="autor" class="form-field">
            <h2 class="form-label">Autor książki:</h2>
            <input id="autor_input" type="text">
        </div>
        <div id="grubosc" class="form-field">
            <h2 class="form-label">Grubość książki<span class="required">*</span>:</h2>
            <input id="grubosc_input" type="number" min="0.5" max="10" step="0.1" value="2">
            <h2 class="form-label">[cm]</h2>
        </div>
        <div id="rok" class="form-field">
            <h2 class="form-label">Rok wydania książki:</h2>
            <input id="rok_input" type="text">
        </div>
        <div id="rok" class="form-field">
            <h2 class="form-label">Wybierz kolor książki:</h2>
            <input id="kolor_input" type="color" value="#aa0000">
        </div>
        <div id="rok" class="form-field">
            <h2 class="form-label">Opis książki:</h2> <br/>
            <textarea id="opis_input" id="book-description" rows="5" cols="100"></textarea>
        </div>
        <div id="wydawca" class="form-field">
            <h2 class="form-label">Nazwa wydawcy:</h2>
            <input id="wydawca_input" type="text">
        </div>
        <div id="oryginal" class="form-field">
            <h2 class="form-label">Tytuł oryginału:</h2>
            <input id="oryginal_input" type="text">
        </div>
        <div id="tlumacz" class="form-field">
            <h2 class="form-label">Nazwisko tłumacza:</h2>
            <input id="tlumacz_input" type="text">
        </div>
        <div id="przyciski">
            <button onclick="closeForm()">Anuluj</button>
            <button onclick="addBookToList()">Dodaj</button>
        </div>
    </div>
    <div id="toast-validation-error">
        Tytuł książki nie może być pusty!
    </div>
    <div id="toast-success">
        Książka została dodana!
    </div>
</body>
</html>
